server:
  port: 8081

spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # MyBatis-Plus
  mybatis-plus:
    mapper-locations: classpath:mapper/**/*.xml
    configuration:
      map-underscore-to-camel-case: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
      db-config:
        id-type: auto
        logic-delete-field: deleted
        logic-delete-value: 1
        logic-not-delete-value: 0

  # Knife4j
  knife4j:
    enable: true
    setting:
      language: zh_cn

# JWT 配置
jwt:
  secret: ${JWT_SECRET:yu-ai-agent-java-default-secret-key-must-be-at-least-256-bits-long}

logging:
  level:
    com.yuaiagent.service: debug
