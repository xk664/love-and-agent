spring:
  # MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:106.53.178.125}:${MYSQL_PORT:13306}/love_and_agent?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  # PgVector (PostgreSQL)
  pgvector:
    driver-class-name: org.postgresql.Driver
    jdbc-url: jdbc:postgresql://${PGVECTOR_HOST:106.53.178.125}:${PGVECTOR_PORT:5432}/${PGVECTOR_DATABASE:love_and_agent}
    username: ${PGVECTOR_USERNAME:root}
    password: ${PGVECTOR_PASSWORD:123456}
    minimum-idle: 2
    maximum-pool-size: 10
    idle-timeout: 30000
    max-lifetime: 1800000
    connection-timeout: 30000

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:106.53.178.125}
      port: ${REDIS_PORT:16379}

      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

# Knife4j API 文档
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    groups:
      enabled: true

knife4j:
  enable: true
  setting:
    language: zh_cn
  openapi:
    title: Yu AI Agent API
    description: AI Agent 智能体平台接口文档
    version: 1.0.0
    group:
      default:
        group-name: 默认分组
        api-rule: package
        api-rule-resources:
          - com.yuaiagent.service

# Python 服务配置
python:
  service:
    base-url: ${PYTHON_SERVICE_URL:http://localhost:8000}
    connect-timeout: 5000
    read-timeout: 30000
    write-timeout: 30000
    endpoints:
      chat-sync: /internal/ai/love/chat/sync
      chat-sse: /internal/ai/love/chat/sse
      agent-run: /internal/agent/run
      agent-cancel: /internal/agent/cancel
      knowledge-index: /internal/knowledge/index
      health: /internal/health

# 内部回调认证配置
internal:
  callback:
    token: ${INTERNAL_CALLBACK_TOKEN:}
