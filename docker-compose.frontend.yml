# =============================================================================
# Docker Compose - Frontend Only
# =============================================================================
# Usage:
#   git clone <repo-url>
#   cd love-and-agent
#   docker-compose -f docker-compose.frontend.yml up -d
# =============================================================================

version: '3.8'

services:
  # Frontend 应用 (源代码构建)
  yu-agent-frontend:
    build:
      context: ./yu-ai-agent-frontend
      dockerfile: Dockerfile
    container_name: love-and-agent-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
