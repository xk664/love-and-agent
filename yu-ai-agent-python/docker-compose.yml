services:
  # ==========================================
  # Python AI Service
  # ==========================================
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yu-ai-agent-python
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=prod
      - DEBUG=false
      # Use container service names for internal connections
      - DB_HOST=mysql
      - DB_PORT=3306
      - PGVECTOR_HOST=pgvector
      - PGVECTOR_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Java backend callback URL (host machine)
      - CALLBACK_BASE_URL=http://host.docker.internal:8081
    depends_on:
      mysql:
        condition: service_healthy
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-network
    volumes:
      - ai-logs:/app/logs

  # ==========================================
  # MySQL - Primary Database
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: yu-ai-mysql
    restart: unless-stopped
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-love_and_agent}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ../yu-ai-agent-java/sql/database.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-network

  # ==========================================
  # PostgreSQL + PgVector - Vector Database
  # ==========================================
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: yu-ai-pgvector
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PGVECTOR_USER:-postgres}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-postgres}
      POSTGRES_DB: ${PGVECTOR_DATABASE:-yu_agent}
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-network

  # ==========================================
  # Redis - Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: yu-ai-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-network

# ==========================================
# Volumes
# ==========================================
volumes:
  mysql-data:
  pgvector-data:
  redis-data:
  ai-logs:

# ==========================================
# Network
# ==========================================
networks:
  ai-network:
    driver: bridge
